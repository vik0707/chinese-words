    function b64decode(b) {
      var bin = atob(b);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder("utf-8").decode(bytes);
    }
    var frame = document.getElementById("app-frame");
    var loading = document.getElementById("loading");
    function showApp(which) {
      loading.style.display = "flex";
      frame.srcdoc = b64decode(PAYLOADS[which]);
      var newHash = which === "landing" ? "" : "#" + which;
      if (location.hash !== newHash) {
        try { history.pushState({which:which}, "", newHash || location.pathname); } catch(e){}
      }
    }
    frame.addEventListener("load", function(){ loading.style.display = "none"; });
    window.addEventListener("message", function(e){
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "goto" && (e.data.which === "en" || e.data.which === "zh")) showApp(e.data.which);
      else if (e.data.type === "back") showApp("landing");
    });
    window.addEventListener("popstate", function(){
      var h = location.hash.replace("#","");
      showApp(h === "en" || h === "zh" ? h : "landing");
    });
    var initial = location.hash.replace("#","");
    showApp(initial === "en" || initial === "zh" ? initial : "landing");
  </script>
