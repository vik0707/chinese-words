// ── localStorage helpers ────────────────────────────────────────────────────
function safeGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function safeSet(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ return false; } }
function safeRemove(k){ try{ localStorage.removeItem(k); }catch(e){} }

function b64decode(b){
  var bin = atob(b);
  var bytes = new Uint8Array(bin.length);
  for (var i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder("utf-8").decode(bytes);
}

// ── Build preload (async — reads Firestore when signed in) ──────────────────
// Deep-merge two zh_v3 JSON strings — takes best of both (multi-device safety)
function deepMergeZhState(rawA, rawB){
  var a, b;
  try { a = JSON.parse(rawA); } catch(e){ return rawB; }
  try { b = JSON.parse(rawB); } catch(e){ return rawA; }
  // Start with cloud (b) as base, enrich with local (a)
  var m = JSON.parse(JSON.stringify(b));

  // 1. wordStats — per word: take max correct, total, level
  var aw = a.wordStats || {}, bw = m.wordStats || {};
  for (var key in aw){
    if (!bw[key]){ bw[key] = aw[key]; }
    else {
      bw[key].correct = Math.max(bw[key].correct||0, aw[key].correct||0);
      bw[key].total   = Math.max(bw[key].total||0,   aw[key].total||0);
      bw[key].level   = Math.max(bw[key].level||0,   aw[key].level||0);
    }
  }
  m.wordStats = bw;

  // 2. dailyLog — union days; same day: take max per field, union keys[]
  var ad = a.dailyLog || {}, bd = m.dailyLog || {};
  for (var dt in ad){
    if (!bd[dt]){ bd[dt] = ad[dt]; }
    else {
      var le = ad[dt], ce = bd[dt];
      var mergedKeys = ce.keys||[];
      if(le.keys) mergedKeys = Array.from(new Set(mergedKeys.concat(le.keys)));
      bd[dt] = {
        sessions:   Math.max(ce.sessions||0,   le.sessions||0),
        words:      Math.max(ce.words||0,      le.words||0),
        minutes:    Math.max(ce.minutes||0,    le.minutes||0),
        newWords:   Math.max(ce.newWords||0,   le.newWords||0),
        dayCorrect: Math.max(ce.dayCorrect||0, le.dayCorrect||0),
        dayTotal:   Math.max(ce.dayTotal||0,   le.dayTotal||0),
        keys:       mergedKeys
      };
    }
  }
  m.dailyLog = bd;

  // 3. modeStats — per mode: take max
  var am = a.modeStats || {}, bm = m.modeStats || {};
  for (var mode in am){
    if (!bm[mode]){ bm[mode] = am[mode]; }
    else {
      bm[mode].correct = Math.max(bm[mode].correct||0, am[mode].correct||0);
      bm[mode].total   = Math.max(bm[mode].total||0,   am[mode].total||0);
    }
  }
  m.modeStats = bm;

  // 4. Scalar maximums
  m.unlockedCount = Math.max(m.unlockedCount||0, a.unlockedCount||0);
  if (a.activeSession === null) m.activeSession = null;

  return JSON.stringify(m);
}

async function buildPreloadAsync(){
  var o = {};
  if (currentUser){
    try {
      var doc = await db.collection("users").doc(currentUser.uid).get();
      if (doc.exists){
        var data = doc.data();
        for (var i=0; i<STORE_KEYS.length; i++){
          var k = STORE_KEYS[i];
          if (data[k] !== undefined) o[k] = data[k];
        }
        // Deep-merge local + cloud — takes best of both worlds across all devices
        try {
          var ZH_KEY="zh_v3";
          var localRaw=safeGet(ZH_KEY);
          if(localRaw && o[ZH_KEY]){
            o[ZH_KEY] = deepMergeZhState(localRaw, o[ZH_KEY]);
            console.warn("buildPreloadAsync: deep-merged local + cloud data");
            // Write merged result back to Firestore so all devices converge
            var _mergedUpd={}; _mergedUpd[ZH_KEY]=o[ZH_KEY];
            db.collection("users").doc(currentUser.uid)
              .set(_mergedUpd,{merge:true})
              .catch(function(e){console.warn("Firestore merge-sync failed:",e);});
          }
        } catch(mergeErr){ console.warn("Preload merge error:",mergeErr); }
      } else {
        // No cloud record yet — migrate any existing localStorage data → Firestore
        var mig = {};
        for (var i=0; i<STORE_KEYS.length; i++){
          var k=STORE_KEYS[i], v=safeGet(k);
          if (v!==null){ o[k]=v; mig[k]=v; }
        }
        if (Object.keys(mig).length){
          db.collection("users").doc(currentUser.uid).set(mig,{merge:true}).catch(function(e){console.warn("Firestore migrate failed:",e);});
        }
      }
    } catch(e){
      // Firestore unavailable – fall back to localStorage
      for (var i=0; i<STORE_KEYS.length; i++){
        var k=STORE_KEYS[i], v=safeGet(k);
        if (v!==null) o[k]=v;
      }
    }
    o.__AUTH__ = JSON.stringify({
      uid:         currentUser.uid,
      displayName: currentUser.displayName,
      email:       currentUser.email,
      photoURL:    currentUser.photoURL
    });
  } else {
    for (var i=0; i<STORE_KEYS.length; i++){
      var k=STORE_KEYS[i], v=safeGet(k);
      if (v!==null) o[k]=v;
    }
    o.__AUTH__ = null;
  }
  return o;
}

function injectPreload(html, preloadObj){
  var snippet = "<script>window.__LS_PRELOAD__="+JSON.stringify(preloadObj).replace(/<\/script>/gi,"<\\/script>")+";<\/script>";
  var m = /<head[^>]*>/i.exec(html);
  if (!m) return snippet+html;
  var pos = m.index+m[0].length;
  return html.slice(0,pos)+snippet+html.slice(pos);
}

var frame   = document.getElementById("app-frame");

var hideTimer = null;
var navToken  = 0;

function hideLoading(){ if(hideTimer){clearTimeout(hideTimer);hideTimer=null;} loading.classList.add("hide"); }
function showLoading(){
  loading.classList.remove("hide");
  if(hideTimer) clearTimeout(hideTimer);
  hideTimer = setTimeout(hideLoading, 1500);
}

var currentPayload="landing";
async function showApp(which){
  currentPayload=which;
  showLoading();
  navToken++;
  var myToken = navToken;
  var html;
  try { html = b64decode(PAYLOADS[which]); }
  catch(e){ loading.textContent="LOAD ERROR"; return; }
  try {
    var preload = await buildPreloadAsync();
    html = injectPreload(html, preload);
  } catch(e){}
  if (myToken !== navToken) return;   // stale – another navigation started
  try {
    var blob = new Blob([html], {type:"text/html;charset=utf-8"});
    if(frame._blobUrl) URL.revokeObjectURL(frame._blobUrl);
    frame._blobUrl = URL.createObjectURL(blob);
    frame.src = frame._blobUrl;
  } catch(e){ loading.textContent="LOAD ERROR"; return; }
  var newHash = which==="landing" ? "" : "#"+which;
  if (location.hash !== newHash){
    try{ history.pushState({which:which},"",newHash||location.pathname); }catch(e){}
  }
}

  }
});


// #27: Firestore retry queue — flushes on reconnect
var _fsRetryQueue = [];
function _fsWrite(uid, upd) {
  if (!currentUser || currentUser.uid !== uid) return;
  db.collection("users").doc(uid).set(upd, {merge:true}).catch(function(e){
    console.warn("Firestore save failed (queued for retry):", e);
    _fsRetryQueue.push({uid: uid, upd: upd});
  });
}
window.addEventListener("online", function() {
  if (!_fsRetryQueue.length) return;
  console.warn("Back online — retrying " + _fsRetryQueue.length + " queued Firestore write(s)");
  var q = _fsRetryQueue.splice(0);
  q.forEach(function(item) {
    if (currentUser && currentUser.uid === item.uid) {
      db.collection("users").doc(item.uid).set(item.upd, {merge:true})
        .then(function(){ console.warn("Retry succeeded"); })
        .catch(function(e){ console.warn("Retry failed again:", e); _fsRetryQueue.push(item); });
    }
  });
});

window.addEventListener("message", function(e){
  var d = e.data;
  if (!d || typeof d !== "object") return;
  if (d.type==="goto" && (d.which==="en"||d.which==="zh")){
    showApp(d.which);
  } else if (d.type==="back"){
    showApp("landing");
  } else if (d.type==="iframe-ready"){
    hideLoading();
  } else if (d.type==="ls-set" && typeof d.key==="string"){
    safeSet(d.key, String(d.value));
    if (currentUser && STORE_KEYS.indexOf(d.key)!==-1){
      var upd={}; upd[d.key]=String(d.value);
      _fsWrite(currentUser.uid, upd);
    }
  } else if (d.type==="ls-remove" && typeof d.key==="string"){
    safeRemove(d.key);
    if (currentUser){ var upd={}; upd[d.key]=firebase.firestore.FieldValue.delete();
      db.collection("users").doc(currentUser.uid).update(upd).catch(function(e){console.warn("Firestore update failed:",e);}); }
  } else if (d.type==="ls-clear"){
    for(var i=0;i<STORE_KEYS.length;i++) safeRemove(STORE_KEYS[i]);
    if (currentUser){
      var upd={};
      for(var i=0;i<STORE_KEYS.length;i++) upd[STORE_KEYS[i]]=firebase.firestore.FieldValue.delete();
      db.collection("users").doc(currentUser.uid).update(upd).catch(function(e){console.warn("Firestore update failed:",e);});
    }
  } else if (d.type==="auth-signin"){
    var provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(function(err){ console.error("Sign-in error:",err); });
  } else if (d.type==="auth-signout"){
    auth.signOut();
  }
});

  if(uid===_lastAuthUid) return; // token refresh — don't reload iframe mid-session
  _lastAuthUid=uid;
  currentUser = user;
  var which = location.hash.replace("#","");
  showApp(which==="en"||which==="zh" ? which : "landing");
});
