function b64decode(b){
  var bin = atob(b);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder("utf-8").decode(bytes);
}

function buildPreload(){
  var o = {};
  for (var i=0; i<STORE_KEYS.length; i++){
    var k = STORE_KEYS[i];
    var v = safeGet(k);
    if (v !== null) o[k] = v;
  }
  return o;
}

function injectPreload(html, preloadObj){
  var snippet = "<script>window.__LS_PRELOAD__=" + JSON.stringify(preloadObj).replace(/<\/script>/gi,"<\\/script>") + ";<\/script>";
  var m = /<head[^>]*>/i.exec(html);
  if (!m) return snippet + html;
  var pos = m.index + m[0].length;
  return html.slice(0, pos) + snippet + html.slice(pos);
}

var frame = document.getElementById("app-frame");
var loading = document.getElementById("loading");
var hideTimer = null;
var navToken = 0;   // increments per showApp call; ignore stale load events

function hideLoading(){
  if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
  loading.classList.add("hide");
}
function showLoading(){
  loading.classList.remove("hide");
  if (hideTimer) clearTimeout(hideTimer);
  // Safety: if neither iframe-ready nor load fire, hide after 1.5s
  hideTimer = setTimeout(hideLoading, 1500);
}

function showApp(which){
  showLoading();
  navToken++;
  var html;
  try {
    html = b64decode(PAYLOADS[which]);
  } catch(e) {
    loading.textContent = "LOAD ERROR";
    return;
  }
  // Inject the storage preload into every payload so the landing
  // page can render its streak/stats summary even in Safari, where
  // srcdoc iframes cannot read native localStorage.
  try { html = injectPreload(html, buildPreload()); } catch(e){}
  try { frame.srcdoc = html; } catch(e){ loading.textContent = "LOAD ERROR"; return; }
  var newHash = which === "landing" ? "" : "#" + which;
  if (location.hash !== newHash) {
    try { history.pushState({which: which}, "", newHash || location.pathname); } catch(e){}
  }
}

// Always hide on iframe load. The about:blank initial load is irrelevant —
// if it fires before showApp, hideLoading is a no-op (overlay re-shown when
// showApp runs); if it fires after, the srcdoc load follows and also hides.
frame.addEventListener("load", function(){
  hideLoading();
});

window.addEventListener("message", function(e){
  var d = e.data;
  if (!d || typeof d !== "object") return;
  if (d.type === "goto" && (d.which === "en" || d.which === "zh")) {
    showApp(d.which);
  } else if (d.type === "back") {
    showApp("landing");
  } else if (d.type === "iframe-ready") {
    // Iframe DCL — content is parsed and scripts have run; safe to reveal.
    hideLoading();
  } else if (d.type === "ls-set" && typeof d.key === "string") {
    safeSet(d.key, String(d.value));
  } else if (d.type === "ls-remove" && typeof d.key === "string") {
    safeRemove(d.key);
  } else if (d.type === "ls-clear") {
    for (var i=0; i<STORE_KEYS.length; i++) safeRemove(STORE_KEYS[i]);
  }
});

window.addEventListener("popstate", function(){
  var h = location.hash.replace("#", "");
  showApp(h === "en" || h === "zh" ? h : "landing");
});

var initial = location.hash.replace("#", "");
showApp(initial === "en" || initial === "zh" ? initial : "landing");
</script>
